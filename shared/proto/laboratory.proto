syntax = "proto3";
package laboratory;
option go_package = "shared/pb";

service IngredientService {
    rpc CreateIngredient(CreateIngredientRequest) returns (IngredientResponse);
    rpc GetIngredients(Empty) returns (IngredientListResponse);
    rpc AddIngredient(AddIngredientRequest) returns (Empty);
}
service RecipesService {
    rpc CreateRecipe(PostRecipeRequest) returns (RecipeResponse);
    rpc GetRecipes(Empty) returns (RecipeListResponse);
}

service JobService {
    rpc PostJob(PostJobRequest) returns(JobUUID);
    rpc GetBrewStatus(JobUUID) returns(JobStatusResponse);
    rpc ChangeStatus(ChangeJobStatus) returns(Empty);
    rpc StartBrewing(JobUUID) returns(JobTime);
}

service BrewService {
    rpc Brew(JobUUID) returns(Empty);
}

message Empty{}

message CreateIngredientRequest {
    string name        = 1;
    string description = 2;
    int32  quantity    = 3;
}

message IngredientResponse {
    int32  id          = 1;
    string name        = 2;
    string description = 3;
    int32  quantity    = 4;
}

message IngredientListResponse {
    repeated IngredientResponse ingredietns = 1;
}

message AddIngredientRequest {
    int32 id           = 1;
    int32 quantity     = 2;
}


// recipes 
message RecipeIngredients {
    int32 ingredietnID    = 1;
    int32 queuntityNeeded = 2;
}

message PostRecipeRequest {
    string name                        = 1;
    string description                 = 2;
    int32 brewingTimeSeconds           = 3;
    repeated RecipeIngredients recIngs = 4;
}

message RecipeResponse {
    int32 id                           = 1;
    string name                        = 2;
    string description                 = 3;
    int32 brewingTimeSeconds           = 4;
    repeated RecipeIngredients recIngs = 5;
}

message RecipeListResponse {
    repeated RecipeResponse recipes = 1;
}

message PostJobRequest {
    int32 recipeId = 1;
    string details = 2;
}

message JobUUID {
    string jobUUID = 1;
}

message JobStatusResponse {
    string status = 1;
}

message ChangeJobStatus {
    string uuid   = 1;
    string status = 2;
}

message JobTime {
    int32 brewingTime = 1;
}