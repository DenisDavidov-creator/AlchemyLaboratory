services:
  db:
    image: postgres:17-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    env_file: ./db-service/.env
    # environment:
    #   - POSTGRES_USER=${POSTGRES_USER}
    #   - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    #   - POSTGRES_DB=${POSTGRES_DB}
    # ports:
    #   - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
  migrate:
    image: migrate/migrate
    volumes:
      - ./db-service/internal/db/migrations:/migrations
    command: ["-path", "/migrations", "-database","postgres://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}?sslmode=disable", "up"]
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
  api-service:
    build:
      context: .              
      dockerfile: api-service/Dockerfile
    env_file: ./api-service/.env
    # environment:
    #   - DB_SERVICE_URL=${DB_SERVICE_URL}
    ports:
      - "8080:8080"
    restart: on-failure
    depends_on:
      db-service:
        condition: service_started
      kafka:
        condition: service_healthy

  db-service:
    build:
      context: .              
      dockerfile: db-service/Dockerfile
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 5s
      retries: 5
    env_file: ./db-service/.env
    depends_on:
      db: 
        condition: service_healthy
      migrate: 
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker-service:
    build:
      context: .              
      dockerfile: worker-service/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 5s
      retries: 5
    env_file: ./worker-service/.env
    depends_on:
      db-service:
        condition: service_started
      kafka:
        condition: service_healthy

  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8090:8080"
    environment:
      - SWAGGER_JSON=/swagger/swagger.json
    volumes:
      - ./api-service/docs:/swagger

  redis:
    image: redis:8.6.2-alpine
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
  kafka:
    image: apache/kafka:latest
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      retries: 5
      start_period: 30s
  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic brew-jobs --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic brew-jobs.retry --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic brew-jobs.dlq --partitions 3 --replication-factor 1 &&
      echo 'Topics created successfully'"
volumes:
  postgres_data:
  kafka_data: